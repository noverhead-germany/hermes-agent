name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: registry.noverhead.de
  IMAGE_NAME: hermes-agent

jobs:
  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.REGISTRY_USER }}" ] || [ -z "${{ secrets.REGISTRY_PASSWORD }}" ]; then
            echo "Secrets missing"
            exit 1
          fi
      - name: Set up Docker daemon
        uses: docker/setup-docker-action@v4
        with:
          daemon-config: |
            {
              "max-concurrent-uploads": 1
            }
      - name: Login private registry
        run: |
          echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login registry.noverhead.de \
            -u "${{ secrets.REGISTRY_USER }}" \
            --password-stdin
      - name: Build image
        run: |
          docker build \
            -t "$REGISTRY/$IMAGE_NAME:latest" \
            -t "$REGISTRY/$IMAGE_NAME:${GITHUB_SHA}" \
            .
      - name: Push image with retries
        run: |
          for image_tag in latest "${GITHUB_SHA}"; do
            for attempt in 1 2 3; do
              if docker push "$REGISTRY/$IMAGE_NAME:${image_tag}"; then
                break
              fi

              if [ "$attempt" -eq 3 ]; then
                echo "Push failed for tag ${image_tag} after ${attempt} attempts."
                exit 1
              fi

              sleep_seconds=$((attempt * 30))
              echo "Push failed for tag ${image_tag}. Retrying in ${sleep_seconds}s."
              sleep "$sleep_seconds"
            done
          done
