name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: registry.noverhead.de
  IMAGE_TAG: ${{ github.event.repository.name }}:latest

jobs:
  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker daemon
        uses: docker/setup-docker-action@v4
        with:
          daemon-config: |
            {
              "max-concurrent-uploads": 1
            }

      - name: Login private registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build image
        run: docker build -t "$REGISTRY/$IMAGE_TAG" .

      - name: Push image with retries
        run: |
          for attempt in 1 2 3; do
            if docker push "$REGISTRY/$IMAGE_TAG"; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi

            sleep_seconds=$((attempt * 30))
            echo "Push fehlgeschlagen. Neuer Versuch in ${sleep_seconds}s."
            sleep "$sleep_seconds"
          done
